<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Login</title>
    <link rel="icon" type="image/png" href="assets/images/auraicon.png">
    <link rel="stylesheet" type="text/css" href="assets/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        
    </header>
    <main>
        <div class="auth-container">
            <div class="auth-sidebar">
                <div>
                    <h2>Aura</h2>
                    <p>Onde a sofisticação encontra sua história.</p>
                </div>
            </div>
            <div class="auth-form-section">
                <div class="auth-header">
                    <h1>Bem-vindo de volta</h1>
                    <p>Acesse sua conta para continuar.</p>
                </div>
            <form action="index.html"> 
                <div class="input-box">
                    <label>E-mail</label>
                    <input type="email" placeholder="seu@email.com" required>
                </div>
                <div class="input-box">
                    <label>Senha</label>
                    <input type="password" placeholder="********" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
            <div class="extra-links">
                <a href="#">Esqueceu sua senha?</a>
                <span>Não tem uma conta? <a href="cadastro.html" style="display:inline;">Cadastre-se aqui</a></span>
            </div>
            </div>
        </div>
    </main>
</body>
</html>
